<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assistente AdminFlow</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Segoe UI',Arial,sans-serif;background:#0f0c1e;height:100vh;display:flex;flex-direction:column;overflow:hidden}
  .header{display:flex;align-items:center;gap:10px;padding:12px 16px;background:rgba(255,255,255,.05);border-bottom:1px solid rgba(255,255,255,.1);flex-shrink:0}
  .av{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#7C6FFF,#FF6FBB);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
  .title{font-size:14px;font-weight:600;color:#F0EEFF}
  .sub{font-size:11px;color:rgba(240,238,255,.5)}
  .dot{width:7px;height:7px;border-radius:50%;background:#6FFFCB;margin-left:auto;box-shadow:0 0 6px #6FFFCB;flex-shrink:0}
  .msgs{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px}
  .msgs::-webkit-scrollbar{width:4px}
  .msgs::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}
  .msg{max-width:86%;padding:9px 13px;border-radius:14px;font-size:13px;line-height:1.55;animation:fadeUp .2s ease}
  @keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
  .bot{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);color:#F0EEFF;border-bottom-left-radius:4px;align-self:flex-start}
  .user{background:linear-gradient(135deg,#7C6FFF,#9B8FFF);color:#fff;border-bottom-right-radius:4px;align-self:flex-end}
  .typing{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);align-self:flex-start;padding:12px 16px}
  .dots{display:flex;gap:4px}
  .dots span{width:6px;height:6px;border-radius:50%;background:rgba(240,238,255,.5);animation:blink 1.2s infinite}
  .dots span:nth-child(2){animation-delay:.2s}
  .dots span:nth-child(3){animation-delay:.4s}
  @keyframes blink{0%,80%,100%{transform:scale(1);opacity:.4}40%{transform:scale(1.3);opacity:1}}
  .chips{display:flex;flex-wrap:wrap;gap:5px;padding:4px 12px 8px;flex-shrink:0}
  .chip{font-size:11px;padding:4px 10px;border-radius:16px;border:1px solid rgba(124,111,255,.4);background:rgba(124,111,255,.1);color:#B8B0FF;cursor:pointer;transition:all .15s}
  .chip:hover{background:rgba(124,111,255,.25);border-color:rgba(124,111,255,.7)}
  .footer{display:flex;gap:8px;padding:10px 12px;border-top:1px solid rgba(255,255,255,.08);flex-shrink:0;background:rgba(255,255,255,.02)}
  input{flex:1;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:8px 13px;color:#F0EEFF;font-size:13px;outline:none;font-family:inherit;transition:border .2s}
  input:focus{border-color:rgba(124,111,255,.6)}
  input::placeholder{color:rgba(240,238,255,.35)}
  button{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,#7C6FFF,#9B8FFF);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity .15s}
  button:hover{opacity:.85}
  button:disabled{opacity:.35;cursor:default}
  button svg{pointer-events:none}
</style>
</head>
<body>
<div class="header">
  <div class="av">🤖</div>
  <div><div class="title">Assistente AdminFlow</div><div class="sub">Dúvidas sobre a empresa</div></div>
  <div class="dot"></div>
</div>

<div class="msgs" id="msgs"></div>

<div class="chips" id="chips">
  <span class="chip" onclick="useChip(this)">Horários</span>
  <span class="chip" onclick="useChip(this)">Contactos</span>
  <span class="chip" onclick="useChip(this)">Política de férias</span>
  <span class="chip" onclick="useChip(this)">Abrir ticket</span>
  <span class="chip" onclick="useChip(this)">Subsídios</span>
</div>

<div class="footer">
  <input id="inp" placeholder="Escreve a tua dúvida..." onkeydown="if(event.key==='Enter')send()">
  <button id="btn" onclick="send()" aria-label="Enviar">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
  </button>
</div>

<script>
// ============================================================
//  EDITE AQUI as informações da vossa empresa
// ============================================================
const EMPRESA = `
Empresa: AdminFlow Lda.
Morada: Rua do Progresso, 123, Coimbra, Portugal
Telefone: +351 239 000 000
Email: geral@adminflow.pt
Website: www.adminflow.pt

HORÁRIO DE FUNCIONAMENTO:
Segunda a Sexta: 08:00 às 18:00
Sábado: 09:00 às 13:00
Domingo: Encerrado

DEPARTAMENTOS:
- Suporte técnico: suporte@adminflow.pt | Resp: Pedro Nunes
- Recursos Humanos: rh@adminflow.pt | Resp: Maria Santos  
- Suporte ao cliente: cliente@adminflow.pt | Resp: Ana Costa
- Desenvolvimento: dev@adminflow.pt | Resp: Rui Ferreira

POLÍTICA DE FÉRIAS:
- 22 dias úteis por ano
- Marcar com 15 dias de antecedência
- Aprovação pelo responsável de divisão
- Marcar abrindo um ticket no sistema

FALTAS E AUSÊNCIAS:
- Comunicar ausência até às 08:30 do próprio dia para o responsável
- Justificação obrigatória em até 3 dias úteis
- Mais de 3 faltas injustificadas: processo disciplinar

BATE-PONTO:
- Obrigatório registar entrada e saída todos os dias
- Tolerância de 10 minutos
- Esquecimentos: comunicar ao responsável no mesmo dia

BENEFÍCIOS:
- Seguro de saúde após 6 meses de empresa
- Formação anual subsidiada até 500€
- Subsídio de refeição: 7,50€/dia útil trabalhado
- Trabalho remoto: até 2 dias por semana com aprovação

COMO ABRIR UM TICKET:
- Entrar no sistema > Meus Tickets > Criar Ticket
- Descrever o problema com detalhe
- Escolher prioridade (Alta/Média/Baixa)
- Resposta em até 4h (Alta) ou 24h (Média/Baixa)

REUNIÕES:
- Reunião geral: primeira segunda-feira do mês às 09:30
- Newsletter interna: enviada toda a sexta-feira

REGRAS GERAIS:
- Dress code: casual profissional
- Uso de telemóvel durante o trabalho: apenas emergências
- Estacionamento disponível para funcionários

INSTRUÇÕES PARA O BOT:
Responde APENAS a perguntas sobre a empresa, serviços, políticas internas e contactos.
Se a pergunta não for sobre a empresa, diz educadamente que só respondes sobre a empresa.
Responde sempre em português europeu, de forma clara e amigável, em 2-4 frases.
Usa texto simples sem markdown com asteriscos.
`;

const hist = [];

function addMsg(txt, role) {
  const m = document.getElementById('msgs');
  const d = document.createElement('div');
  d.className = 'msg ' + role;
  d.textContent = txt;
  m.appendChild(d);
  m.scrollTop = m.scrollHeight;
}

function showTyping() {
  const m = document.getElementById('msgs');
  const d = document.createElement('div');
  d.className = 'msg typing'; d.id = 'typ';
  d.innerHTML = '<div class="dots"><span></span><span></span><span></span></div>';
  m.appendChild(d); m.scrollTop = m.scrollHeight;
}

function removeTyping() { document.getElementById('typ')?.remove(); }

function useChip(el) {
  document.getElementById('inp').value = el.textContent;
  document.getElementById('chips').style.display = 'none';
  send();
}

async function send() {
  const inp = document.getElementById('inp');
  const btn = document.getElementById('btn');
  const txt = inp.value.trim();
  if (!txt || btn.disabled) return;
  inp.value = ''; btn.disabled = true;
  document.getElementById('chips').style.display = 'none';
  addMsg(txt, 'user');
  hist.push({ role: 'user', content: txt });
  showTyping();
  try {
    const r = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 800,
        system: EMPRESA,
        messages: hist
      })
    });
    const d = await r.json();
    removeTyping();
    const reply = d?.content?.[0]?.text || 'Não consegui obter resposta. Tenta novamente.';
    addMsg(reply, 'bot');
    hist.push({ role: 'assistant', content: reply });
  } catch {
    removeTyping();
    addMsg('Erro de ligação. Verifica a internet e tenta novamente.', 'bot');
  }
  btn.disabled = false;
  inp.focus();
}

addMsg('Olá! Sou o assistente da AdminFlow. Posso ajudar com horários, contactos, férias, tickets e outras dúvidas internas. Em que posso ajudar?', 'bot');
</script>
</body>
</html>
